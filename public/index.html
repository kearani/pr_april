<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления документооборотом</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация документа</h2>
        <input type="text" id="docTitle" placeholder="Название документа">
        <button onclick="addDoc()">Добавить</button>

        <h3>Архив документов</h3>
        <table id="docTable">
            <tr><th>ID</th><th>Название</th><th>Дата</th></tr>
        </table>
    </div>

    <script>
        async function loadDocs() {
            const res = await fetch('/api/documents');
            const docs = await res.json();
            const table = document.getElementById('docTable');
            
            table.innerHTML = '<tr><th>ID</th><th>Название</th><th>Дата</th><th>Действия</th></tr>';
            
            docs.forEach(d => {
                table.innerHTML += `
                    <tr>
                        <td>${d.id}</td>
                        <td>${d.title}</td>
                        <td>${d.date}</td>
                        <td>
                            <button onclick="prepareEdit(${d.id}, '${d.title}', '${d.date}')">Изменить</button>
                            <button onclick="deleteDoc(${d.id})">Удалить</button>
                        </td>
                    </tr>`;
            });
        }

    async function addDoc() {
        const title = document.getElementById('docTitle').value;
        if (!title) return alert("Введите название документа!");

        await fetch('/api/documents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, author: "Администратор" }) 
        });

        document.getElementById('docTitle').value = '';
        loadDocs(); 
    }

    async function prepareEdit(id, oldTitle, oldDate) {
        const newTitle = prompt("Введите новое название:", oldTitle);
        const newDate = prompt("Введите новую дату и время:", oldDate);

        if (newTitle !== null && newDate !== null) {
            await fetch(`/api/documents/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title: newTitle, date: newDate })
            });
            loadDocs(); 
        }
    }    

    async function deleteDoc(id) {
        if (confirm(`Вы уверены, что хотите удалить документ №${id}?`)) {
            await fetch(`/api/documents/${id}`, {
                method: 'DELETE'
            });
            loadDocs(); 
        }
    }

        loadDocs();
    </script>
</body>
</html>
